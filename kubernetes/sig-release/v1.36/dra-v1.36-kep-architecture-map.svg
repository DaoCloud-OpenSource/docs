<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050" role="img" aria-labelledby="title desc">
  <title id="title">DRA v1.36 KEP Architecture Map</title>
  <desc id="desc">Architecture map of Kubernetes v1.36-related Dynamic Resource Allocation enhancements, showing request surface, API state, scheduling, node preparation, resource model, and operations visibility.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-muted" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .box { stroke-width: 2; rx: 8; }
      .request { fill: #eff6ff; stroke: #60a5fa; }
      .api { fill: #f0fdf4; stroke: #4ade80; }
      .sched { fill: #fefce8; stroke: #facc15; }
      .node { fill: #fff7ed; stroke: #fb923c; }
      .model { fill: #f5f3ff; stroke: #a78bfa; }
      .ops { fill: #fdf2f8; stroke: #f472b6; }
      .feedback { fill: #f0f9ff; stroke: #38bdf8; }
      .state-note { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .section { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .item { font: 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1e293b; }
      .muted { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .small { font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .note { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #92400e; }
      .arrow { fill: none; stroke: #2563eb; stroke-width: 2.5; marker-end: url(#arrow); }
      .arrow-muted { fill: none; stroke: #64748b; stroke-width: 2.2; marker-end: url(#arrow-muted); }
      .arrow-dashed { fill: none; stroke: #64748b; stroke-width: 2.2; stroke-dasharray: 8 7; marker-end: url(#arrow-muted); }
      .tag { font: 700 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1d4ed8; }
      .tagbox { fill: #dbeafe; stroke: #93c5fd; rx: 6; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="1050"/>

  <text class="title" x="40" y="52">DRA v1.36 KEP Architecture Map</text>
  <text class="subtitle" x="40" y="82">v1.36-related DRA enhancements, not the full DRA architecture</text>

  <rect class="box request" x="40" y="120" width="330" height="220"/>
  <text class="section" x="62" y="154">Request Surface</text>
  <text class="item" x="62" y="190">
    <tspan x="62" dy="0">5729 Workload / PodGroup references</tspan>
    <tspan x="62" dy="20">ResourceClaim or ResourceClaimTemplate</tspan>
  </text>
  <text class="item" x="62" y="240">
    <tspan x="62" dy="0">5004 Extended resource requests</tspan>
    <tspan x="62" dy="20">handled by a DRA driver</tspan>
  </text>
  <text class="item" x="62" y="292">
    <tspan x="62" dy="0">5018 AdminAccess for diagnostic claims</tspan>
    <tspan class="note" x="62" dy="20">RBAC-gated admin / diagnostic access</tspan>
  </text>

  <rect class="box api" x="420" y="120" width="350" height="260"/>
  <text class="section" x="442" y="154">Kubernetes API State</text>
  <text class="item" x="442" y="190">
    <tspan x="442" dy="0">ResourceSlices and ResourceClaims</tspan>
  </text>
  <text class="item" x="442" y="224">
    <tspan x="442" dy="0">4817 ResourceClaim status:</tspan>
    <tspan x="442" dy="20">device state and network data</tspan>
  </text>
  <text class="item" x="442" y="278">
    <tspan x="442" dy="0">4680 Pod status resource health</tspan>
  </text>
  <text class="muted" x="442" y="318">
    <tspan x="442" dy="0">ResourceClaim.status.reservedFor ties</tspan>
    <tspan x="442" dy="18">allocated claims back to workloads</tspan>
  </text>

  <rect class="box sched" x="820" y="120" width="350" height="270"/>
  <text class="section" x="842" y="154">Scheduling and Binding</text>
  <text class="item" x="842" y="190">
    <tspan x="842" dy="0">4816 Prioritized alternatives</tspan>
    <tspan x="842" dy="20">for scarce device requests</tspan>
  </text>
  <text class="item" x="842" y="242">
    <tspan x="842" dy="0">5007 Binding conditions delay Pod binding</tspan>
    <tspan x="842" dy="20">until external attach is ready</tspan>
  </text>
  <text class="item" x="842" y="294">
    <tspan x="842" dy="0">5055 Device taints and tolerations</tspan>
    <tspan class="note" x="842" dy="20">stage alpha in KEP metadata;</tspan>
    <tspan class="note" x="842" dy="18">beta target for v1.36</tspan>
  </text>

  <rect class="state-note" x="600" y="402" width="420" height="58"/>
  <text class="tag" x="620" y="426">scheduler / DynamicResources plugin writes</text>
  <text class="item" x="620" y="449">ResourceClaim.status.allocation / reservedFor</text>

  <rect class="box request" x="40" y="500" width="330" height="220"/>
  <text class="section" x="62" y="534">Heterogeneous Device Pools</text>
  <text class="item" x="62" y="572">
    <tspan x="62" dy="0">GPU, MIG, TPU, NIC, FPGA,</tspan>
    <tspan x="62" dy="20">and other vendor-managed devices</tspan>
  </text>
  <text class="item" x="62" y="626">
    <tspan x="62" dy="0">ResourceSlice capacity and attributes</tspan>
    <tspan x="62" dy="20">feed scheduling decisions and</tspan>
    <tspan x="62" dy="20">operator visibility</tspan>
  </text>

  <rect class="box node" x="420" y="500" width="350" height="250"/>
  <text class="section" x="442" y="534">Node / Kubelet / DRA Driver</text>
  <text class="item" x="442" y="572">
    <tspan x="442" dy="0">NodePrepareResources /</tspan>
    <tspan x="442" dy="20">NodeUnprepareResources</tspan>
  </text>
  <text class="item" x="442" y="626">
    <tspan x="442" dy="0">3695 PodResources API includes</tspan>
    <tspan x="442" dy="20">DRA allocations</tspan>
    <tspan class="muted" x="442" dy="18">node-local kubelet gRPC</tspan>
  </text>
  <text class="item" x="442" y="700">
    <tspan x="442" dy="0">5304 Device attributes exposed</tspan>
    <tspan x="442" dy="20">to workloads via CDI metadata files</tspan>
  </text>

  <rect class="box model" x="820" y="500" width="350" height="250"/>
  <text class="section" x="842" y="534">Resource Model and Fit Semantics</text>
  <text class="item" x="842" y="572">
    <tspan x="842" dy="0">4815 Partitionable devices</tspan>
    <tspan x="842" dy="20">5075 Consumable capacity</tspan>
    <tspan x="842" dy="20">5491 List-type attributes</tspan>
  </text>
  <text class="item" x="842" y="654">
    <tspan x="842" dy="0">5517 DRA Node Allocatable Resources</tspan>
    <tspan x="842" dy="20">unified scheduler / kubelet accounting</tspan>
    <tspan class="muted" x="842" dy="18">CPU, memory, ephemeral storage, hugepages</tspan>
  </text>

  <rect class="box ops" x="1220" y="200" width="340" height="270"/>
  <text class="section" x="1242" y="234">Availability / Operations View</text>
  <text class="item" x="1242" y="272">
    <tspan x="1242" dy="0">5677 ResourcePoolStatusRequest</tspan>
    <tspan x="1242" dy="20">on-demand availability view</tspan>
  </text>
  <text class="item" x="1242" y="326">
    <tspan x="1242" dy="0">Inputs: ResourceSlices plus</tspan>
    <tspan x="1242" dy="20">ResourceClaim consumption</tspan>
  </text>
  <text class="note" x="1242" y="390">
    <tspan x="1242" dy="0">Operator / query view;</tspan>
    <tspan x="1242" dy="18">not a scheduler pipeline step</tspan>
  </text>

  <rect class="box feedback" x="420" y="820" width="750" height="170"/>
  <text class="section" x="442" y="854">Workload and Operations Feedback</text>
  <text class="item" x="442" y="892">
    <tspan x="442" dy="0">PodResources: node-local kubelet gRPC</tspan>
    <tspan x="442" dy="22">Pod.status resource health</tspan>
    <tspan x="442" dy="22">ResourceClaim.status allocation, device state, network data</tspan>
  </text>
  <text class="muted" x="442" y="966">Device health and taints influence future allocation and eviction.</text>

  <rect class="box ops" x="1220" y="820" width="340" height="140"/>
  <text class="section" x="1242" y="854">Consumers</text>
  <text class="item" x="1242" y="894">
    <tspan x="1242" dy="0">kubectl</tspan>
    <tspan x="1242" dy="22">autoscalers</tspan>
    <tspan x="1242" dy="22">platform SREs</tspan>
  </text>

  <path class="arrow" d="M 370 230 L 420 230"/>
  <path class="arrow" d="M 770 230 L 820 230"/>
  <path class="arrow" d="M 995 390 L 995 402"/>
  <path class="arrow" d="M 810 431 L 770 500"/>
  <path class="arrow" d="M 995 500 L 995 390"/>
  <path class="arrow-muted" d="M 370 610 C 395 610 395 350 420 350"/>
  <path class="arrow-muted" d="M 770 270 C 980 270 1010 310 1220 310"/>
  <path class="arrow-muted" d="M 370 650 C 700 650 880 410 1220 410"/>
  <path class="arrow-muted" d="M 1390 470 L 1390 820"/>
  <path class="arrow" d="M 595 750 L 595 820"/>
  <path class="arrow-dashed" d="M 1090 820 C 1230 680 1230 350 1170 300"/>
  <path class="arrow-dashed" d="M 770 690 C 980 760 1070 780 1220 880"/>

  <rect class="tagbox" x="64" y="758" width="251" height="32"/>
  <text class="tag" x="80" y="779">Device state changes come back as signals</text>
  <path class="arrow-dashed" d="M 205 720 C 205 760 380 780 420 875"/>
</svg>
